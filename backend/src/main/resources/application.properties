# Old configuration - use active configuration below






# ==========================
# TradePro Application Configuration
# ==========================

# --------------------------
# Application
# --------------------------
spring.application.name=tradepro-backend

# --------------------------
# Server
# --------------------------
server.port=8080

# --------------------------
# PostgreSQL Database
# --------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/tradepro-db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# --------------------------
# JPA / Hibernate
# --------------------------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --------------------------
# JWT
# --------------------------
jwt.secret=${JWT_SECRET:CHANGE-THIS-IN-DEV}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# --------------------------
# TOTP
# --------------------------
totp.issuer=TradePro

# --------------------------
# CORS
# --------------------------
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174

# --------------------------
# Spring Boot Actuator
# --------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# --------------------------
# Logging
# --------------------------
logging.level.root=INFO
logging.level.com.tradepro=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE