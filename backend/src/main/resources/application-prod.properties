# ===========================
# TradePro PRODUCTION Config
# ===========================
# Set these as environment variables on your server / Docker / Railway / Render

# Server
server.port=${PORT:8080}

# ---- PostgreSQL ----
# Render's connectionString property gives: postgresql://user:pass@host/db
# The JDBC driver doesn't accept credentials embedded in the URL this way.
# Instead we use the individual properties that Render also exposes.
# In render.yaml we map: DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD
spring.datasource.url=jdbc:postgresql://${DB_HOST:${PGHOST:localhost}}:${DB_PORT:${PGPORT:5432}}/${DB_NAME:${PGDATABASE:tradeprodb}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:${PGUSER:tradepro}}
spring.datasource.password=${DB_PASSWORD:${PGPASSWORD:changeme}}
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Flyway (uncomment once you add migration scripts)
# spring.flyway.enabled=true
# spring.flyway.locations=classpath:db/migration

# ---- JWT ----
jwt.secret=${JWT_SECRET:change-this-in-production-must-be-256-bits}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ---- TOTP ----
totp.issuer=${TOTP_ISSUER:TradePro}

# ---- CORS ----
cors.allowed-origins=${CORS_ORIGINS:https://trade-pro-t7l6.vercel.app,https://*.vercel.app}

# ---- Logging ----
logging.level.com.tradepro=INFO
logging.level.root=INFO
