services:
  # PostgreSQL (for production-like local dev)
  postgres:
    image: postgres:16-alpine
    container_name: tradepro-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tradeprodb}
      POSTGRES_USER: ${POSTGRES_USER:-tradepro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradepro"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradepro-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-tradeprodb}
      DB_USERNAME: ${DB_USERNAME:-tradepro}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  # React Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080/api
    container_name: tradepro-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
