# render.yaml — Deploy everything to Render.com with one click
# https://render.com/docs/blueprint-spec

services:
  # ── Spring Boot Backend ──
  - type: web
    name: tradepro-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: tradepro-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: tradepro-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: tradepro-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: tradepro-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: tradepro-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://trade-profinal-e1mzs68l9-ritisshhs-placements-projects.vercel.app
      - key: TOTP_ISSUER
        value: TradePro
    healthCheckPath: /api/health

  # ── React Frontend ──
  - type: web
    name: tradepro-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    dockerCommand: nginx -g 'daemon off;'
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://tradepro-backend.onrender.com/api
    pullRequestPreviewsEnabled: true

databases:
  - name: tradepro-db
    plan: free
    databaseName: tradeprodb
    user: tradepro
