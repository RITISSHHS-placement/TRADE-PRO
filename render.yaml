# render.yaml — Backend only (frontend is on Vercel)
services:
  - type: web
    name: tradepro-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: tradepro-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: tradepro-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: tradepro-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: tradepro-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: tradepro-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://trade-pro-t7l6.vercel.app,https://*.vercel.app
      - key: TOTP_ISSUER
        value: TradePro
    healthCheckPath: /api/health

databases:
  - name: tradepro-db
    plan: free
    databaseName: tradeprodb
    user: tradepro
